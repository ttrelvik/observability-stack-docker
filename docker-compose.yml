services:
  grafana:
    image: grafana/grafana-oss:13.0.2
    user: "1000:1000"
    env_file: .env.observability

    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-config/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana-config/provisioning:/etc/grafana/provisioning
    networks:
      - traefik-net       # So Traefik can see it
      - observability-net # For internal communication
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        # --- Traefik Labels ---
        - "traefik.enable=true"
        - "traefik.swarm.network=traefik-net"
        - "traefik.http.routers.grafana.rule=Host(`grafana.trelvik.net`)"
        - "traefik.http.routers.grafana.entrypoints=https"
        - "traefik.http.routers.grafana.tls.certresolver=myresolver"
        - "traefik.http.routers.grafana.service=grafana"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  loki:
    image: grafana/loki:3.7.2
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki-config:/etc/loki
      - loki-data:/loki
    networks:
      - observability-net
    deploy:
      placement:
        constraints:
          - node.role == manager

  prometheus:
    image: prom/prometheus:v3.12.0
    command: --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus-config:/etc/prometheus
      - prometheus-data:/prometheus
    networks:
      - observability-net
      - traefik-net
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=traefik-net"
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.trelvik.net`)"
        - "traefik.http.routers.prometheus.entrypoints=https"
        - "traefik.http.routers.prometheus.service=prometheus"
        - "traefik.http.routers.prometheus.tls.certresolver=myresolver"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
        # Secure the Prometheus UI with the same SSO middleware as the Traefik dashboard
        - "traefik.http.routers.prometheus.middlewares=sso-auth@swarm"

  node-exporter:
    image: prom/node-exporter:v1.11.1
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - observability-net
    deploy:
      mode: global

  alloy:
    image: grafana/alloy:v1.16.2
    user: root
    # Expose Alloy's UDP port to receive syslog messages
    ports:
      - target: 1514
        published: 1514
        protocol: udp
        mode: host
    volumes:
      - ./alloy-config/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - traefik-logs:/var/log-traefik:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    networks:
      - observability-net
    deploy:
      placement:
        constraints:
          - node.role == manager

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.57.0
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
    command:
      - --enable_metrics=cpu,memory,network,disk
      - --store_container_labels=true
      - '--housekeeping_interval=10s'
      - --docker_only=true
    networks:
      - observability-net
    deploy:
      mode: global

  alertmanager:
      image: prom/alertmanager:v0.32.2
      command:
        - '--config.file=/etc/alertmanager/alertmanager.yml'
        - '--storage.path=/alertmanager'
      volumes:
        - ./alertmanager-config:/etc/alertmanager
        - alertmanager-data:/alertmanager
      networks:
        - observability-net
        - traefik-net
      secrets:
        - alertmanager_smtp_password
      deploy:
        placement:
          constraints:
            - node.role == manager
        labels:
          - "traefik.enable=true"
          - "traefik.swarm.network=traefik-net"
          - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.trelvik.net`)"
          - "traefik.http.routers.alertmanager.entrypoints=https"
          - "traefik.http.routers.alertmanager.tls.certresolver=myresolver"
          - "traefik.http.routers.alertmanager.service=alertmanager"
          - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"
          # Middleware for SSO authentication:
          - "traefik.http.routers.alertmanager.middlewares=sso-auth@swarm"

secrets:
  alertmanager_smtp_password:
    external: true

networks:
  traefik-net:
    external: true
  observability-net:
    driver: overlay
    attachable: true

volumes:
  grafana-data:
    external: true
    name: observability-stack-docker_grafana-data
  loki-data:
    external: true
    name: observability-stack-docker_loki-data
  prometheus-data:
    external: true
    name: observability-stack-docker_prometheus-data
  traefik-logs:
    external: true
  alertmanager-data: {}